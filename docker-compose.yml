version: "3.9"

# Ride Sharing System — Local Development Stack
# Start: docker compose up --build
# Stop:  docker compose down -v

services:

  postgres:
    image: postgres:15-alpine
    container_name: ride-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-devuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpass}
      POSTGRES_DB:       ${POSTGRES_DB:-ride_sharing}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"   # 5433 on host to avoid conflict with other systems
    networks:
      - infra
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-devuser} -d ${POSTGRES_DB:-ride_sharing}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: ride-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6380:6379"
    networks:
      - infra
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: ride-kafka
    restart: unless-stopped
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,EXTERNAL://localhost:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      CLUSTER_ID: "ride-cluster-local-001"
    volumes:
      - kafka_data:/var/lib/kafka/data
    ports:
      - "9093:9092"
    networks:
      - infra
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 > /dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  migrate:
    image: flyway/flyway:10-alpine
    container_name: ride-migrate
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      -url=jdbc:postgresql://postgres:5432/${POSTGRES_DB:-ride_sharing}
      -user=${POSTGRES_USER:-devuser}
      -password=${POSTGRES_PASSWORD:-devpass}
      -locations=filesystem:/flyway/sql
      -baselineOnMigrate=true
      migrate
    volumes:
      - ./migrations:/flyway/sql:ro
    networks:
      - infra

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ride-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      ConnectionStrings__PostgreSQL: ${DB_CONNECTION_STRING:-Host=postgres;Port=5432;Database=ride_sharing;Username=devuser;Password=devpass;}
      ConnectionStrings__Redis: ${REDIS_URL:-redis:6379}
      ConnectionStrings__Kafka: ${KAFKA_BROKERS:-kafka:29092}
      PORT: ${PORT:-8080}
    ports:
      - "${PORT:-8081}:8080"
    networks:
      - app
      - infra
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  postgres_data:
  redis_data:
  kafka_data:

networks:
  app:
    driver: bridge
  infra:
    driver: bridge
